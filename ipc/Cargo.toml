[package]
name = "ipc"
version.workspace = true
edition.workspace = true

# no_std by default; enable "std" for host testing.
[features]
default = []
std = []

[dependencies]

# cfg(kani) is injected by cargo-kani; teach plain cargo it's expected.
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(kani)"] }
