[package]
name = "urt"
version.workspace = true
edition.workspace = true

[dependencies]
ipc = { path = "../ipc" }

[dev-dependencies]
proptest = "1"

# cfg(kani) is injected by cargo-kani; teach plain cargo it's expected
# (same handling as kcore).
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(kani)"] }
