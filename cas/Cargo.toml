[package]
name = "cas"
version.workspace = true
edition.workspace = true

# "std" enables host testing; "no_std" for embedded use is planned but
# not yet wired — all algorithms are host-testable (spec §1).
[features]
default = ["std"]
std = ["blake3/std"]
# Exposes `fuzz_support` (checksum re-sealing helpers for the cargo-fuzz
# harnesses in cas/fuzz). Never enabled in normal builds.
fuzzing = []

[dependencies]
blake3 = { version = "1", default-features = false, features = ["pure"] }

[dev-dependencies]
proptest = "1"

# cfg(kani) is injected by cargo-kani; teach plain cargo it's expected.
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(kani)"] }
