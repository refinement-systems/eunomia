SPECIFICATION SpecThreadAsymBad

\* NEGATIVE CONTROL — the injected-ASYMMETRIC-bug guard for the Threads axis of
\* SafetySymmetry, the thread dual of CapRevocation_AsymBug (Procs) and
\* CapRevocation_CapAsymBug (CapIds). Where the symmetric
\* CapRevocation_Safety_NegControl runs SpecBad (a bug present in every orbit
\* member, so it survives even a wrong quotient), this runs SpecThreadAsymBad:
\* LeakRevokedThreadAsym leaks a dead cap into the SPECIFIC thread AsymThread's
\* "exit" binding slot, a FireSafe violation that singles out one THREAD model
\* value and so breaks the Threads-symmetry premise. At the safety arm's
\* constants AND under the SAME SYMMETRY SafetySymmetry, the quotient must STILL
\* report it — proving the declared symmetry is not OVER-broad over Threads (it
\* never merges an asymmetric violating state with a non-violating one). It must
\* keep violating FireSafe for as long as CapRevocation_Safety carries SYMMETRY
\* SafetySymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT FireSafe
