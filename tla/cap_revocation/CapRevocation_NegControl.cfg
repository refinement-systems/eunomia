SPECIFICATION SpecBad

\* NEGATIVE CONTROL — SAFETY (rev2§2.2 leaf-first obligation). Under
\* RevokeStepBad (RevokeStep minus the IsLeaf filter, so it may delete an
\* INTERIOR descendant), LiveParent MUST be violated: deleting a cap with
\* live children leaves them pointing at a dead parent. The runnable proof
\* the leaf-first deletion order is load-bearing — the real model (Spec,
\* CapRevocation.cfg) keeps the same invariant. TLC reports a short trace
\* (build a 2-deep subtree, RevokeBegin, RevokeStepBad deletes the middle).

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

INVARIANT TypeOK
INVARIANT LiveParent
