SPECIFICATION Spec

\* Standing floor-containment check (rev2§2.2/§3 CDT revocation). The liveness arm
\* CapRevocation.cfg checks only TypeOK + EventuallyRevoked at the floor
\* (Threads={t0}, QueueDepth=1) and drops the six safety obligations on the
\* argument that CapRevocation_Safety.cfg re-checks them at the larger residence
\* constants (Threads={t0,t1}, QueueDepth=2), whose reachable set is a superset of
\* this floor. This cfg mechanizes that argument so it is no longer load-bearing on
\* inspection alone: it is CapRevocation_Safety.cfg re-run at the floor constants,
\* re-checking the same MoveSemantics/DeadNowhere/LiveParent/FireSafe/RevokedDead
\* invariants and the ReportMonotone action property directly on the floor. If a
\* future edit ever gated an action on Threads/QueueDepth so a floor state escaped
\* the safety arm's superset, that state's safety violation now fails here instead
\* of going unchecked. Sub-second; lives off the critical-path `model` job.
\*
\* EventuallyRevoked is NOT checked here — it is the liveness arm's job, needs the
\* tableau, and is why that arm can carry no SYMMETRY (rev2§2.2).

\* Terminal states are legitimate (e.g. every cap retyped away).
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

\* Same SYMMETRY as CapRevocation_Safety.cfg: this is a safety-only arm (no
\* liveness property) and every obligation checked here is symmetric under
\* Procs x CapIds x Threads, so the quotient is sound — the
\* CapRevocation_ReportMonotoneBad / *AsymBug controls are the standing proof it
\* prunes no real bug. At the floor Threads is a singleton, so its component of the
\* quotient degenerates to identity. See SafetySymmetry in the spec.
SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT MoveSemantics
INVARIANT DeadNowhere
INVARIANT LiveParent
INVARIANT FireSafe
INVARIANT RevokedDead

\* ReportMonotone is a safety action-property ([][...]_vars), not a liveness
\* property — it needs no fairness and builds no tableau (rev2§5.1).
PROPERTY ReportMonotone
