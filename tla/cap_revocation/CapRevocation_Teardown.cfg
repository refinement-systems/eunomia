SPECIFICATION TSpec

\* rev2§3.3 channel whole-object teardown: peer-closed firing safety under the
\* refcount discipline. The revocation half (Spec) is checked separately by
\* CapRevocation.cfg; here its variables are held constant.

\* Terminal states are legitimate (every notification freed, channel torn
\* down).
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

\* Notifs are interchangeable model values; TSpec checks no liveness property,
\* so the symmetry reduction is sound. Collapses each permutation-orbit of
\* Notifs to one representative. See NotifSymmetry in the spec.
SYMMETRY NotifSymmetry

INVARIANT TTypeOK
INVARIANT RefCountSound
INVARIANT ChannelFireSafe
INVARIANT ReclaimedReleased
