SPECIFICATION SpecRevokedDeadBad

\* NEGATIVE CONTROL — the symmetry-soundness teeth-test for RevokedDead, the
\* rev2§2.2 ghost invariant (revoked \cap live = {}) the safety arm checks under
\* SYMMETRY SafetySymmetry. RevokedDead is a state invariant, the case TLC's
\* symmetry reduction is soundly defined for; this control is the runnable proof it
\* still has teeth. SpecRevokedDeadBad's ReviveRevoked returns a revoked (dead) cap
\* to `live` and a cspace while leaving it in `revoked`, so a slot is dead and live
\* at once — a SYMMETRIC RevokedDead violation (present in every orbit member, so
\* it survives even a wrong quotient, exactly as SpecBad does for LiveParent and
\* SpecReportBad for ReportMonotone). Run at the safety arm's constants AND under
\* the SAME SYMMETRY SafetySymmetry, the quotient must STILL report it: if
\* SafetySymmetry ever made the RevokedDead check unsound this control would stop
\* tripping. It must keep violating RevokedDead for as long as CapRevocation_Safety
\* carries SYMMETRY SafetySymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT RevokedDead
