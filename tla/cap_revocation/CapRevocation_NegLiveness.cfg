SPECIFICATION SpecNoGuard

\* NEGATIVE CONTROL — LIVENESS (rev2§2.2 marker/derive-guard). Under
\* CopyNoGuard (Copy minus the ~AncestorOrSelfRevoking guard), derivation
\* into a revoking subtree is allowed, so a RevokeStep<->CopyNoGuard cycle
\* re-grows the subtree forever and EventuallyRevoked MUST livelock — even
\* though RevokeStep keeps firing (the trace is fair). The runnable proof
\* the derive guard is load-bearing for termination; the real model (Spec,
\* CapRevocation.cfg) keeps the guard and EventuallyRevoked holds. TLC
\* reports a lasso (RevokeStep deletes a leaf, CopyNoGuard re-adds it).
\*
\* A second cfg is needed (not folded into CapRevocation_NegControl.cfg)
\* because a TLC .cfg admits exactly one SPECIFICATION, and the two controls
\* target different specs (SpecBad vs SpecNoGuard).

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

PROPERTY EventuallyRevoked
