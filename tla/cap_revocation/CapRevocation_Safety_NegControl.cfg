\* NEGATIVE CONTROL — the symmetry soundness guard for the safety arm. This is
\* CapRevocation_NegControl (SpecBad: RevokeStepBad deletes an INTERIOR
\* descendant, so LiveParent MUST be violated) re-run at the safety arm's
\* constants AND under the SAME SYMMETRY SafetySymmetry that CapRevocation_Safety
\* declares. TLC never validates a symmetry itself; this control is the runnable
\* proof that the quotient does not prune real bugs — if SafetySymmetry ever made
\* the safety arm unsound (e.g. silently canonicalising away a violating state),
\* this control would stop tripping. It must keep violating LiveParent for as
\* long as CapRevocation_Safety carries SYMMETRY SafetySymmetry. SpecBad is a
\* SYMMETRIC bug (present in every orbit member, so it survives even a wrong
\* quotient); the asymmetric SpecAsymBad / SpecCapAsymBad controls cover the
\* over-broad-quotient case the Procs / CapIds CHOOSE seeds risk.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT LiveParent
