\* NEGATIVE CONTROL — the symmetry-soundness teeth-test for ReportMonotone, the
\* one safety PROPERTY (a [][...]_vars action property, not a state invariant)
\* that CapRevocation_Safety checks under SYMMETRY SafetySymmetry. TLC's symmetry
\* is soundly defined for state invariants; an action property is sound under the
\* quotient only if it is itself symmetric, which ReportMonotone is (it ranges
\* uniformly over Threads, naming none). SpecReportBad's ReportFlip lets a thread
\* whose report already reached a terminal state flip to the other terminal value
\* — a SYMMETRIC ReportMonotone violation (present in every orbit member, so it
\* survives even a wrong quotient, exactly as SpecBad does for LiveParent). Run
\* at the safety arm's constants AND under the SAME SYMMETRY SafetySymmetry, the
\* quotient must STILL report it: if SafetySymmetry ever made the ReportMonotone
\* check unsound this control would stop tripping. The asymmetric
\* SpecThreadAsymBad (FireSafe) already guards the over-broad-Threads case. It
\* must keep violating ReportMonotone for as long as CapRevocation_Safety carries
\* SYMMETRY SafetySymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
PROPERTY ReportMonotone
