SPECIFICATION Spec

\* Terminal states are legitimate (e.g. every cap retyped away).
CHECK_DEADLOCK FALSE

\* Constants for the STEPWISE revoke model. The atomic-revoke baseline
\* ran 4 caps / 2 procs / 2 threads / QueueDepth 2 (~799k states). Splitting
\* revoke into per-leaf steps and adding the EventuallyRevoked liveness check
\* explodes the interleaved space (~13M reachable states, a >40M-state
\* liveness tableau that exhausts heap at the full constants). The atomic
\* model already established the safety invariants at the full scale; the stepwise
\* new obligation is that they hold at every MID-revoke interleaved state and
\* that a marked revoke completes — both exercised by this structurally
\* complete, smaller model: 4 caps still give multi-level subtrees, and a cap
\* still reaches all three residences (cspace, queue slot, TCB binding slot),
\* so leaf-first safety and revoke-through-queue/binding are covered. Threads
\* 2->1 and QueueDepth 2->1 trim the residence combinatorics enough that the
\* liveness tableau fits.
CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

INVARIANT TypeOK
INVARIANT MoveSemantics
INVARIANT DeadNowhere
INVARIANT LiveParent
INVARIANT FireSafe
INVARIANT RevokedDead

PROPERTY ReportMonotone

\* Stepwise-revoke liveness: a started (marked) revoke eventually empties its subtree,
\* under the WF on RevokeStep carried by Spec and the Copy derive-guard. The
\* committed negative control CapRevocation_NegLiveness.cfg drops the guard
\* and shows this property livelock.
PROPERTY EventuallyRevoked
