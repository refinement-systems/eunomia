CHECK_DEADLOCK FALSE

\* Constants for the stepwise-revoke + EventuallyRevoked liveness arm. This arm
\* is heap-bound by the liveness tableau, so the constants are the floor that
\* keeps the model structurally complete while the tableau still fits: 4 caps
\* are the minimum that build a multi-level CDT subtree, and a cap still reaches
\* all three residences (cspace, queue slot, TCB binding slot), so leaf-first
\* safety and revoke-through-queue/binding stay covered; Threads and QueueDepth
\* are held at 1 to trim the residence combinatorics the tableau would otherwise
\* blow past. Safety at the larger constants lives on the invariant-only sibling
\* CapRevocation_Safety.cfg, where no tableau caps the scale.
CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

\* This liveness arm checks only the well-typedness floor (TypeOK) and the
\* EventuallyRevoked liveness property below. The full safety suite checked over
\* this same Init/Next — the MoveSemantics single-owner invariant (rev2§3.4) and
\* its DeadNowhere/LiveParent companions, the FireSafe firing-slot invariant and
\* the ReportMonotone terminal-report action property (rev2§5.1), and the
\* RevokedDead ghost discipline — is NOT re-checked here. All of it is checked by
\* the sibling CapRevocation_Safety.cfg at the strictly larger residence constants
\* (Threads=2, QueueDepth=2) under SYMMETRY SafetySymmetry, whose reachable set is
\* a strict superset of this floor: this floor is the special case where the
\* second thread never acts and the channel ring stays depth-1. That superset
\* claim is mechanized by the sibling CapRevocation_SafetyFloor.cfg, which
\* re-checks these obligations at this floor so a future edit cannot silently
\* break it. Re-evaluating them on every state of the heap-bound liveness tableau
\* is redundant per-state work
\* (MoveSemantics/DeadNowhere build residence sets via Cardinality, the dominant
\* per-state cost). TypeOK is kept as the cheap structural sanity floor so a
\* malformed-state bug cannot make EventuallyRevoked pass vacuously.
\* EventuallyRevoked stays here alone because TLC's symmetry reduction is unsound
\* under liveness (rev2§2.2), so this arm can carry no SYMMETRY quotient.
INVARIANT TypeOK

\* Stepwise-revoke liveness: a started (marked) revoke eventually empties its subtree,
\* under the WF on RevokeStep carried by Spec and the Copy derive-guard. The
\* committed negative control CapRevocation_NegLiveness.cfg drops the guard
\* and shows this property livelock.
PROPERTY EventuallyRevoked
