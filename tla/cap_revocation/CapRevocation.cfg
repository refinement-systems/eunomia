SPECIFICATION Spec

\* Terminal states are legitimate (e.g. every cap retyped away).
CHECK_DEADLOCK FALSE

\* Constants for the stepwise-revoke + EventuallyRevoked liveness arm. This arm
\* is heap-bound by the liveness tableau, so the constants are the floor that
\* keeps the model structurally complete while the tableau still fits: 4 caps
\* are the minimum that build a multi-level CDT subtree, and a cap still reaches
\* all three residences (cspace, queue slot, TCB binding slot), so leaf-first
\* safety and revoke-through-queue/binding stay covered; Threads and QueueDepth
\* are held at 1 to trim the residence combinatorics the tableau would otherwise
\* blow past. Safety at the larger constants lives on the invariant-only sibling
\* CapRevocation_Safety.cfg, where no tableau caps the scale.
CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

INVARIANT TypeOK
INVARIANT MoveSemantics
INVARIANT DeadNowhere
INVARIANT LiveParent
INVARIANT FireSafe
INVARIANT RevokedDead

PROPERTY ReportMonotone

\* Stepwise-revoke liveness: a started (marked) revoke eventually empties its subtree,
\* under the WF on RevokeStep carried by Spec and the Copy derive-guard. The
\* committed negative control CapRevocation_NegLiveness.cfg drops the guard
\* and shows this property livelock.
PROPERTY EventuallyRevoked
