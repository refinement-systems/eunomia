SPECIFICATION SpecCapAsymBad

\* NEGATIVE CONTROL — the injected-ASYMMETRIC-bug guard for the CapIds axis of
\* SafetySymmetry, the dual of CapRevocation_AsymBug (which guards the Procs axis).
\* Where the symmetric CapRevocation_Safety_NegControl runs SpecBad (a bug present
\* in every orbit member, so it survives even a wrong quotient), this runs
\* SpecCapAsymBad: LeakRevokedCapAsym leaks the SPECIFIC dead cap AsymCap (a fixed
\* non-InitCap id) into a cspace, a DeadNowhere violation that singles out one CAP
\* model value and so breaks the CapIds-symmetry premise. At the safety arm's
\* constants AND under the SAME SYMMETRY SafetySymmetry, the quotient must STILL
\* report it — proving the declared symmetry is not OVER-broad over CapIds (it
\* never merges an asymmetric violating state with a non-violating one despite the
\* asymmetric InitCap CHOOSE seed, the structurally-riskiest part of the cap
\* quotient). It must keep violating DeadNowhere for as long as
\* CapRevocation_Safety carries SYMMETRY SafetySymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT DeadNowhere
