SPECIFICATION Spec

\* Safety-only projection of Spec (rev2§2.2/§3 CDT revocation). The same Init
\* and Next as CapRevocation.cfg, but with NO temporal liveness property: the
\* EventuallyRevoked tableau is checked once, by CapRevocation.cfg, and is what
\* forces that arm down to its constant floor (Threads=1, QueueDepth=1) to fit in
\* heap. Dropping it here lets the same safety invariants run at the larger
\* residence constants the liveness arm trims away — Threads=2 and QueueDepth=2,
\* i.e. a second TCB's bind/exit/fault interleavings and a depth-2 channel ring —
\* so every mid-revoke interleaved state the liveness floor cannot reach is now
\* checked against MoveSemantics/LiveParent/FireSafe/etc. The reachable set is a
\* strict superset of the liveness arm's, so this is added safety coverage, not a
\* re-run. CapIds stays at 4 (as the liveness arm); deeper CDT breadth is a
\* separate axis. Spec's WF(RevokeStep) fairness is simply unused when no
\* liveness property is checked, so Spec is reused directly.

\* Terminal states are legitimate (e.g. every cap retyped away).
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

INVARIANT TypeOK
INVARIANT MoveSemantics
INVARIANT DeadNowhere
INVARIANT LiveParent
INVARIANT FireSafe
INVARIANT RevokedDead

\* ReportMonotone is a safety action-property ([][...]_vars), not a liveness
\* property — it needs no fairness and builds no tableau, so it stays on the
\* safety arm.
PROPERTY ReportMonotone
