SPECIFICATION SpecAsymBad

\* NEGATIVE CONTROL — the injected-ASYMMETRIC-bug guard for the Procs axis of
\* SafetySymmetry. Where CapRevocation_Safety_NegControl runs the SYMMETRIC SpecBad
\* (a bug present in every orbit member, so it survives even a wrong quotient),
\* this runs SpecAsymBad: LeakRevokedAsym leaks a dead cap into a SPECIFIC
\* non-InitProc process, a DeadNowhere violation that singles out one model value
\* and so breaks the Procs-symmetry premise. At the safety arm's constants AND
\* under the SAME SYMMETRY SafetySymmetry, the quotient must STILL report it —
\* proving the declared symmetry is not OVER-broad over Procs (it never merges an
\* asymmetric violating state with a non-violating one despite the asymmetric
\* InitProc CHOOSE seed). CapRevocation_CapAsymBug is its CapIds-axis dual. It
\* must keep violating DeadNowhere for as long as CapRevocation_Safety carries
\* SYMMETRY SafetySymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT DeadNowhere
