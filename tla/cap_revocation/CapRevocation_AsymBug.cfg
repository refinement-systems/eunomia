SPECIFICATION SpecAsymBad

\* NEGATIVE CONTROL — the injected-ASYMMETRIC-bug guard for ProcSymmetry. Where
\* CapRevocation_Safety_NegControl runs the SYMMETRIC SpecBad (a bug present in
\* every orbit member, so it survives even a wrong quotient), this runs
\* SpecAsymBad: LeakRevokedAsym leaks a dead cap into a SPECIFIC non-InitProc
\* process, a DeadNowhere violation that singles out one model value and so
\* breaks the Procs-symmetry premise. At the safety arm's constants AND under the
\* SAME SYMMETRY ProcSymmetry, the quotient must STILL report it — proving the
\* declared symmetry is not OVER-broad (it never merges an asymmetric violating
\* state with a non-violating one despite the asymmetric InitProc CHOOSE seed).
\* It must keep violating DeadNowhere for as long as CapRevocation_Safety carries
\* SYMMETRY ProcSymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY ProcSymmetry

INVARIANT TypeOK
INVARIANT DeadNowhere
