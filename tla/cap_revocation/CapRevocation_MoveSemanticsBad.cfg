\* NEGATIVE CONTROL — the symmetry-soundness teeth-test for MoveSemantics, the
\* rev2§3.4 single-owner invariant the safety arm checks under SYMMETRY
\* SafetySymmetry. MoveSemantics is a state invariant, the case TLC's symmetry
\* reduction is soundly defined for; this control is the runnable proof it still
\* has teeth. SpecMoveBad's DupOwner copies a LIVE cap from one process's cspace
\* into another's without removing it, so the cap owns two residences at once — a
\* SYMMETRIC MoveSemantics violation (present in every orbit member, so it survives
\* even a wrong quotient, exactly as SpecBad does for LiveParent and SpecReportBad
\* for ReportMonotone). Run at the safety arm's constants AND under the SAME
\* SYMMETRY SafetySymmetry, the quotient must STILL report it: if SafetySymmetry
\* ever made the MoveSemantics check unsound this control would stop tripping. The
\* asymmetric SpecAsymBad / SpecCapAsymBad already guard the over-broad
\* Procs / CapIds case. It must keep violating MoveSemantics for as long as
\* CapRevocation_Safety carries SYMMETRY SafetySymmetry.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0, t1}
    Notifs = {nf0, nf1}
    QueueDepth = 2
    NULL = NULL

SYMMETRY SafetySymmetry

INVARIANT TypeOK
INVARIANT MoveSemantics
