\* NEGATIVE CONTROL — LIVENESS / FAIRNESS (rev2§2.2 restartable revoke). Under
\* SpecExistFair (the per-cap WF on RevokeStep weakened to a single existential
\* WF on the whole disjunct), EventuallyRevoked MUST livelock: a fair schedule
\* can keep firing RevokeStep on one revoking subtree (drain + refill) forever
\* while another marked root's subtree persists, so the persisting root's revoke
\* never completes. The runnable proof the per-cap Fairness is load-bearing; the
\* real model (Spec, CapRevocation.cfg) keeps it and EventuallyRevoked holds.
\*
\* CapIds is 5, one above the liveness floor (4). The starvation needs two
\* disjoint revoking subtrees under a non-revoking common root — a churned root
\* (drain + refill) plus a starved root that persists — which at peak holds five
\* caps live at once: the common root, and two caps in each subtree. At the
\* 4-cap floor that configuration is unreachable and EventuallyRevoked HOLDS even
\* under the existential WF, so the floor cannot witness the weakening; 5 is the
\* minimum breadth that exhibits the lasso. As a liveness control TLC stops at
\* the first lasso (periodic liveness checking), so it never exhausts the 5-cap
\* reachable set.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    CapIds = {c0, c1, c2, c3, c4}
    Procs  = {p0, p1}
    Channels = {ch0}
    Threads = {t0}
    Notifs = {nf0, nf1}
    QueueDepth = 1
    NULL = NULL

PROPERTY EventuallyRevoked
