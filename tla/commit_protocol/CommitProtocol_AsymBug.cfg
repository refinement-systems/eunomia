SPECIFICATION SpecAsymBad

\* NEGATIVE CONTROL — the symmetry soundness guard against an OVER-BROAD Refs
\* quotient. SpecAsymBad runs every real action except a Recover (RecoverAsymBad)
\* that rebuilds nothing for ONE CHOOSE-singled ref, so RecoverReconstructs MUST
\* be violated. Run under the SAME SYMMETRY RefSymmetry that CommitProtocol.cfg
\* declares. TLC never validates a symmetry itself; where the symmetric
\* RecoverNoop control (CommitProtocol_NegControl.cfg) only proves the property
\* still has teeth — a symmetric bug survives even a wrong quotient — this
\* asymmetric bug singles out one model value, so if RefSymmetry ever became
\* over-broad (silently merging an asymmetric violating state with a
\* non-violating one) this control would stop tripping. It must keep violating
\* RecoverReconstructs for as long as CommitProtocol.cfg carries SYMMETRY
\* RefSymmetry. Constants are kept in lock-step with CommitProtocol.cfg and
\* CommitProtocol_NegControl.cfg.

\* Terminal states are legitimate (all writes committed, nothing dirty).
CHECK_DEADLOCK FALSE

CONSTANTS
    Refs = {r1, r2, r3}
    MaxWrites = 2
    NULL = NULL

SYMMETRY RefSymmetry

PROPERTY RecoverReconstructs
