SPECIFICATION Spec

\* Terminal states are legitimate (all writes committed, nothing dirty).
CHECK_DEADLOCK FALSE

CONSTANTS
    Refs = {r1, r2}
    MaxWrites = 2
    NULL = NULL

\* Sound state-space quotient over the interchangeable ref ids (see RefSymmetry
\* in CommitProtocol.tla). The negative controls CommitProtocol_NegControl.cfg
\* (symmetric bug) and CommitProtocol_AsymBug.cfg (asymmetric bug) run under this
\* same SYMMETRY and must still trip — the standing proof it is sound (TLC never
\* validates a symmetry itself).
SYMMETRY RefSymmetry

INVARIANT TypeOK
INVARIANT AtLeastOneValidSlot
INVARIANT GenerationsDistinct
INVARIANT CommittedRootsDurable
INVARIANT AckedWritesRecoverable

\* rev2§6/§4.5 replay-equality: the rebuilt overlay after Recover equals the
\* acked unflushed writes past the committed head (semantic, not a mirror of
\* the action body). The negative control CommitProtocol_NegControl.cfg shows
\* this property has teeth.
PROPERTY RecoverReconstructs
