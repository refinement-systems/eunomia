\* NEGATIVE CONTROL (rev2§6): under the no-op RecoverNoop (a Recover that
\* rebuilds nothing), RecoverReconstructs MUST be violated — the runnable
\* proof the replay-equality property has teeth. The real model (Spec) is
\* checked by CommitProtocol.cfg, where the same property passes.
\*
\* Run under the SAME SYMMETRY RefSymmetry that CommitProtocol.cfg declares: this
\* is the symmetric-bug soundness guard — RecoverNoop rebuilds nothing for every
\* ref, so the violation is present in every orbit member and must survive the
\* quotient. (The over-broad-quotient case is guarded by the asymmetric
\* CommitProtocol_AsymBug.cfg.)

\* Terminal states are legitimate (all writes committed, nothing dirty).
CHECK_DEADLOCK FALSE

CONSTANTS
    Refs = {r1, r2, r3}
    MaxWrites = 2
    NULL = NULL

SYMMETRY RefSymmetry

PROPERTY RecoverReconstructs
