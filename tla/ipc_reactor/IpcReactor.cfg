\* Deadlock detection is OFF because an all-delivered terminal
\* state is legitimate — every message received, the receiver may then block on a
\* clear word and the sender is idle (nextSend = MaxMsgs). The consequence is that
\* a genuine lost-wakeup *deadlock* is caught ONLY by the EventuallyDelivered
\* PROPERTY below, not by deadlock detection. Do NOT drop that PROPERTY line: with
\* CHECK_DEADLOCK FALSE and no liveness property, a true lost-wakeup deadlock would
\* pass silently.
CHECK_DEADLOCK FALSE

CONSTANTS
    MaxMsgs = 3
    QueueDepth = 2

INVARIANT TypeOK
INVARIANT NoLostWakeup
INVARIANT NoLostWakeupWritable
INVARIANT NoDrop
INVARIANT FifoPerChannel

\* See the deadlock-detection note above: this liveness property is the ONLY check that catches a
\* genuine lost-wakeup deadlock (deadlock detection is intentionally off).
PROPERTY EventuallyDelivered
