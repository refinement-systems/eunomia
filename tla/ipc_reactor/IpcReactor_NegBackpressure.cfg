SPECIFICATION SpecBadWritable

\* NEGATIVE CONTROL — the writable lost-wakeup / backpressure half (rev2§3.3).
\* Under RecvGetNoWritable (RecvGet minus the on-writable fire, so draining a slot
\* never signals wword / wakes a blocked sender), NoLostWakeupWritable MUST be
\* violated: a sender blocks on Full, the receiver drains a slot, but the sender is
\* never woken — it is left blocked with a free slot (Len(queue) < QueueDepth) and
\* no writable signal. The runnable proof the on-writable fire is load-bearing —
\* the real model (Spec, IpcReactor.cfg) keeps the fire and NoLostWakeupWritable
\* holds. TLC reports a short trace: Register -> Send -> Send (queue full) ->
\* SendBlock -> RecvWake -> RecvGetNoWritable (blocked sender, slot freed). Mirrors
\* the real-code harness's documented control (model.rs: removing recv_nb's
\* on_writable signal makes the blocked sender hang).
\*
\* A separate cfg is needed (not folded into the others) because a TLC .cfg admits
\* exactly one SPECIFICATION, and the three controls target different specs.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    MaxMsgs = 3
    QueueDepth = 2

INVARIANT TypeOK
INVARIANT NoLostWakeupWritable
