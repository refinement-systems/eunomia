\* NEGATIVE CONTROL — the send-before-bind poll-once (rev2§3.6).
\* Under RegisterNoPoll (Register minus the poll-once self-signal, so an already-
\* queued message is never surfaced on the bind), NoLostWakeup MUST be violated:
\* a message is sent before the receiver binds, the receiver registers without
\* surfacing it, then blocks on the clear word while a message sits in the queue.
\* The runnable proof the poll-once is load-bearing — the real model (Spec,
\* IpcReactor.cfg) keeps the self-signal and NoLostWakeup holds. TLC reports a
\* short trace: Send (before bind) -> RegisterNoPoll -> RecvBlock (blocked with a
\* queued message). Mirrors the real-code harness's documented control (model.rs:
\* deleting register's self-signal deadlocks the send-before-bind interleaving).
\*
\* A separate cfg is needed (not folded into the others) because a TLC .cfg admits
\* exactly one SPECIFICATION, and the three controls target different specs.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    MaxMsgs = 3
    QueueDepth = 2

INVARIANT TypeOK
INVARIANT NoLostWakeup
