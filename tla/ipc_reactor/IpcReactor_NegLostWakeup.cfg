\* NEGATIVE CONTROL — the wait-side lost-wakeup (rev2§3.6), a runnable
\* artifact. Under RecvBlockNoGuard
\* (RecvBlock minus the `word = 0` guard, so the receiver blocks without checking
\* the accumulated word), NoLostWakeup MUST be violated: an on-readable signal
\* accumulates (word = 1) and the receiver blocks anyway, holding a wakeup it slept
\* through. The runnable proof the word-check-before-block is load-bearing — the
\* real model (Spec, IpcReactor.cfg) keeps the guard and NoLostWakeup holds. TLC
\* reports a short trace: Register -> Send (word = 1) -> RecvBlockNoGuard (blocked
\* holding word = 1). Mirrors kcore::notification's wait word-check.
\*
\* A separate cfg is needed (not folded into the others) because a TLC .cfg admits
\* exactly one SPECIFICATION, and the three controls target different specs.

\* Terminal states are legitimate.
CHECK_DEADLOCK FALSE

CONSTANTS
    MaxMsgs = 3
    QueueDepth = 2

INVARIANT TypeOK
INVARIANT NoLostWakeup
