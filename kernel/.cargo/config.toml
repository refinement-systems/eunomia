# softfloat: the kernel must never touch FP/SIMD registers — trap frames
# don't save them, and CPACR_EL1 traps them at EL1.
[build]
target = "aarch64-unknown-none-softfloat"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

# cargo run launches QEMU. Pass -s -S to wait for GDB on port 1234.
[target.aarch64-unknown-none-softfloat]
runner = [
    "qemu-system-aarch64",
    "-machine", "virt,gic-version=3",
    "-cpu", "cortex-a72",
    "-m", "256M",
    "-nographic",
    "-serial", "mon:stdio",
    "-kernel",
]
