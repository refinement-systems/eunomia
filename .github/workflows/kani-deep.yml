name: kani-deep

# The HEAVY, off-PR verification tier (review rec. #2/#3 follow-up,
# doc/results/14_kani-review-2.md): the exhaustive mini-TLC replays at deep
# depths and the composition CDT Kani harnesses at WIDENED bounds. These take
# minutes-to-hours and may OOM by design, so they run on a weekly schedule (and
# on demand) rather than per PR. The per-PR `ci.yml` keeps the cheap replay
# depth and the TLC-scale Kani bounds.
on:
  schedule:
    # Weekly, Mondays 07:00 UTC (offset from fuzz.yml's daily 06:00).
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      exhaustive_depth:
        description: "BarePool replay sequence length"
        default: "5"
      cross_home_depth:
        description: "Cross-home (World) replay sequence length"
        default: "4"
      deep_timeout:
        description: "Per-harness wall cap (seconds) for the deep Kani run"
        default: "2400"

jobs:
  # The mini-TLC replays at deep depths — plain Rust, no Kani, ~a minute.
  # Exhaustive over the CDT algebra (BarePool) and over revoke-through-
  # queue/TCB-bind-slot homes (World).
  deep-replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Exhaustive replays (deep depths)
        env:
          EXHAUSTIVE_DEPTH: ${{ github.event.inputs.exhaustive_depth || '5' }}
          CROSS_HOME_DEPTH: ${{ github.event.inputs.cross_home_depth || '4' }}
        run: bash scripts/deep-verify.sh replay

  # The composition CDT harnesses at widened bounds (POOL_SLOTS=6, K=4) via the
  # kani_deep feature. May take tens of minutes per harness or OOM — that is the
  # expected off-CI behaviour, so this job does not gate anything. Pinned
  # cargo-kani 0.67.0, same install as ci.yml's `kani` job.
  deep-kani:
    runs-on: ubuntu-latest
    # The two harnesses can each run to the per-harness DEEP_TIMEOUT (default
    # 2400 s) plus compile/install; cap the whole job well above that.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo-kani + backend
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: kani-0.67.0-${{ runner.os }}
      - name: Install Kani (pinned)
        run: |
          if ! command -v cargo-kani >/dev/null; then
            cargo install --locked kani-verifier --version 0.67.0
          fi
          cargo kani setup
      - name: Deep Kani (widened bounds)
        env:
          DEEP_TIMEOUT: ${{ github.event.inputs.deep_timeout || '2400' }}
        run: bash scripts/deep-verify.sh kani
