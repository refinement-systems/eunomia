name: ci

# Rerun the formal models and the host
# test suite on every PR, and boot the system under QEMU to run the rev2§5.1
# spawn/reclaim exit criterion. Fuzzing has its own workflow (fuzz.yml).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Host unit + integration tests for every workspace crate except the
  # kernel (no_std / bare-metal aarch64 — it can't build for the host).
  # Covers the slot-allocator (urt), the monotone rights-mask attenuation
  # (storage-server sessions), the CAS canonical-form proptests, the wire
  # decoders, the ELF parser, and the rest.
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace minus kernel)
        run: cargo test --workspace --exclude kernel
      - name: ipc wire codec tests (feature-gated)
        # The wire codec (rev2§3.7) is behind the opt-in `wire` feature so minimal
        # user binaries stay no-alloc; `cargo test --workspace` builds ipc
        # default-features, so its unit tests need this explicit pass.
        run: cargo test -p ipc --features wire

  # Rerun the TLA+ proofs. The CapRevocation safety model (incl. the rev2§3.3
  # channel whole-object teardown TSpec), the CommitProtocol model, and the
  # rev2§3.6 IpcReactor lost-wakeup/backpressure model must all come back clean,
  # and the negative controls must all still FAIL — the M1/M2 formal gates,
  # re-checked on every PR.
  model:
    runs-on: ubuntu-latest
    # find-tla-tools.sh honours a pre-set JAVA + TLA_TOOLS as its explicit-override
    # tier, so the same scripts run here without auto-detecting a toolchain.
    # TLA_TOOLS points at the byte-identical vendored jar (verified below), not a
    # rolling download, so the toolchain is pinned the way the Verus binary is.
    # TLC_WORKERS is fixed for reproducibility; -Xmx sizes the heap-bound liveness
    # tableau.
    env:
      JAVA: java
      TLA_TOOLS: ${{ github.workspace }}/tools/tla/tla2tools.jar
      TLC_WORKERS: "4"
      TLA_JAVA_OPTS: -Xmx4g
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Verify the vendored tla2tools.jar matches its pin
        run: cd tools/tla && shasum -c tla2tools.jar.sha1
      - name: Model-check CapRevocation (+ teardown), CommitProtocol, IpcReactor
        # Assert each run's distinct-states (the coverage metric) against its
        # pinned row in tools/tla/model-manifest.tsv, so a silent coverage SHRINK
        # (same verdict, fewer states explored) fails CI here, not just a local
        # baseline run. All four cfgs run here are pinned; set per-step so it never
        # reaches the unpinned negative controls below.
        env:
          TLC_ASSERT_MANIFEST: "1"
        run: |
          # -lncheck final defers the EventuallyRevoked liveness check (rev2§2.2
          # restartable revoke) to a single SCC pass over the complete tableau,
          # dropping TLC's periodic intermediate passes. Behaviour-preserving —
          # same distinct/diameter/verdict, only less scheduling work. Scoped to
          # this liveness arm alone: on a *failing* spec `final` forfeits the
          # early-exit, so it must stay off the negative controls below, whose
          # livelock has to trip cheaply. -lncheck is an internal TLC strategy
          # selector (absent from its -help), so its semantics ride the
          # vendored-jar pin verified above — a jar bump must re-confirm it.
          TLC_FLAGS="-lncheck final" bash tools/tla/tla-model-check.sh tla/cap_revocation/CapRevocation.tla
          bash tools/tla/tla-model-check.sh tla/cap_revocation/CapRevocation.tla CapRevocation_Teardown.cfg
          bash tools/tla/tla-model-check.sh tla/commit_protocol/CommitProtocol.tla
          # Safety invariants + the EventuallyDelivered liveness property.
          bash tools/tla/tla-model-check.sh tla/ipc_reactor/IpcReactor.tla
      - name: Safety negative controls must fail as designed
        # The cheap invariant/property controls only; each trips on a short
        # counterexample. The two liveness controls (EventuallyRevoked) run in the
        # separate `model-neg-liveness` job below so the ~5-cap NegFairness check
        # is off this serial critical path. Pinned to a single worker / -Xmx2g
        # (the job env sets 4 / -Xmx4g for the positive specs) for a deterministic
        # short trace.
        env:
          TLC_WORKERS: "1"
          TLA_JAVA_OPTS: -Xmx2g
        run: bash scripts/tla-neg-controls.sh safety

  # The safety-only arm of the CapRevocation model (rev2§2.2/rev2§3 CDT revocation),
  # a SEPARATE job so it runs in PARALLEL with `model` — total model-checking
  # wall-clock is then the max of the two arms, not their sum. It drops the
  # EventuallyRevoked liveness property (checked by `model` above), and that
  # tableau is what forces the liveness arm down to its constant floor; without
  # it the same safety invariants run at the larger residence constants the
  # liveness arm trims (Threads=2, QueueDepth=2), so MoveSemantics/LiveParent/
  # FireSafe/etc. now hold across a second TCB's bind/exit/fault interleavings and
  # a depth-2 channel ring. Run under SYMMETRY SafetySymmetry (Procs, CapIds,
  # and Threads): its 12,183,480 reachable states collapse to 635,034
  # post-quotient orbit representatives (same behaviours, fewer states) vs the
  # liveness arm's 503,070. Same vendored-jar pin and TLC_WORKERS as `model`.
  model-safety:
    runs-on: ubuntu-latest
    # ~1.5 min at 4 workers; the cap is margin — a constants bump that explodes the
    # state space should fail fast here, not hang.
    timeout-minutes: 15
    env:
      JAVA: java
      TLA_TOOLS: ${{ github.workspace }}/tools/tla/tla2tools.jar
      TLC_WORKERS: "4"
      TLA_JAVA_OPTS: -Xmx4g
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Verify the vendored tla2tools.jar matches its pin
        run: cd tools/tla && shasum -c tla2tools.jar.sha1
      - name: Model-check CapRevocation safety invariants at larger constants
        # Assert distinct-states against the pinned CapRevocation_Safety row
        # (tools/tla/model-manifest.tsv) so a silent coverage shrink fails CI here.
        env:
          TLC_ASSERT_MANIFEST: "1"
        run: bash tools/tla/tla-model-check.sh tla/cap_revocation/CapRevocation.tla CapRevocation_Safety.cfg
      - name: Model-check CapRevocation safety obligations at the liveness floor
        # Mechanizes the CapRevocation.cfg subsumption argument: re-checks the six
        # safety obligations at the liveness floor (Threads={t0}, QueueDepth=1)
        # under the same SYMMETRY SafetySymmetry, so a future edit that breaks
        # floor-containment (e.g. an action newly gated on Threads/QueueDepth) fails
        # CI here instead of silently leaving a floor state unchecked. Sub-second,
        # and off the critical-path `model` job. Same manifest assertion as above.
        env:
          TLC_ASSERT_MANIFEST: "1"
        run: bash tools/tla/tla-model-check.sh tla/cap_revocation/CapRevocation.tla CapRevocation_SafetyFloor.cfg

  # The liveness negative controls (the EventuallyRevoked teeth-tests: the missing
  # derive-guard NegLiveness, and NegFairness — the per-cap fairness weakened to a
  # single existential WF). A SEPARATE job so it runs in PARALLEL with `model`
  # rather than serially behind its positive specs: NegFairness explores a 5-cap
  # reachable set (one above the liveness floor) to exhibit its starvation lasso
  # and is the suite's slowest single check, so running it serially in `model`
  # would dominate the whole critical path. Run at the same 4 workers / -Xmx4g
  # as the positive arm to shrink its own runtime. These controls keep TLC's
  # default periodic liveness checking — never `-lncheck final`: on a *failing* spec
  # `final` forfeits the early-exit and balloons the livelock detection (the
  # inverse of why the positive liveness arm sets it at `model` above). Same
  # vendored-jar pin and TLC_WORKERS as `model`.
  model-neg-liveness:
    runs-on: ubuntu-latest
    # NegFairness is the pole here; the cap is margin, not a budget.
    timeout-minutes: 15
    env:
      JAVA: java
      TLA_TOOLS: ${{ github.workspace }}/tools/tla/tla2tools.jar
      TLC_WORKERS: "4"
      TLA_JAVA_OPTS: -Xmx4g
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Verify the vendored tla2tools.jar matches its pin
        run: cd tools/tla && shasum -c tla2tools.jar.sha1
      - name: Liveness negative controls must fail as designed
        run: bash scripts/tla-neg-controls.sh liveness

  # The rev2§5.1 exit criterion: boot the real system under QEMU and drive the
  # shell through the burn regression (spawn/wait/reclaim 100x), status
  # propagation, the wild-pointer fault demo + re-spawn, the panic path,
  # and the time grant. Also runs the M1 cap-mechanism EL0 test. Needs a
  # nightly toolchain with rust-src for the kernel's build-std.
  on-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The user/* binaries now build std via build-std from the vendored fork
      # (vendor/rust). Check out only what build-std needs: vendor/rust itself
      # (non-recursive, so its huge llvm-project/cargo/miri submodules are
      # skipped) plus its library/backtrace nested submodule, which std includes
      # unconditionally via `#[path]`. The fork commit is pinned by the eunomiaos
      # submodule pointer.
      - name: Check out the vendored std (library + its backtrace submodule)
        run: |
          # .gitmodules pins SSH URLs; rewrite to HTTPS so the public repos clone
          # without an SSH key on the runner.
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init vendor/rust
          git -C vendor/rust submodule update --init library/backtrace
      - uses: dtolnay/rust-toolchain@master
        with:
          # Pinned to the vendor/rust commit (matches kernel/rust-toolchain.toml).
          # rust-src backs the kernel's own core/compiler_builtins build-std; the
          # user/* std comes from vendor/rust (kernel/build.rs redirect).
          toolchain: nightly-2026-06-26
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Install QEMU (aarch64 system emulation)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-arm
      - name: M1 cap-mechanism test (caps/CDT, revoke, reports, teardown)
        run: bash scripts/m1-test.sh
      - name: Spawn/reclaim burn loop + fault / panic / time demo
        run: bash scripts/spawn-test.sh
      - name: std runtime QEMU gate (println!/format!/Vec/Box/String/Instant/SystemTime)
        # The first live std user binary (user/stdsmoke): boots it under the shell
        # and asserts the whole std stack works at EL0, plus the std-owned panic
        # reaps as STATUS_PANIC. This single gate demonstrates the whole std runtime
        # surface (entry/argv/env, GlobalAlloc, stdio, time) live under QEMU.
        run: bash scripts/std-smoke-test.sh
      - name: std fs QEMU gate (File/read/write/read_dir/rename/remove/sync)
        # The std fs client (user/stdfs): boots it under the shell and asserts the
        # whole sys/fs/eunomia surface works at EL0 against storaged, over a second
        # (multiplexed) session opened by the client-side connect handshake.
        run: bash scripts/fs-smoke-test.sh
      - name: on-target library-test triage (coretests/alloctests subset)
        # Runs a small curated subset of the upstream `coretests`/`alloctests` unit-test
        # suites against the eunomia PAL under QEMU, so a library-facing
        # PAL regression is caught by real Rust library tests. The full sweep and the
        # committed skip lists (scripts/libtest-skips/) run locally via `--full`.
        run: bash scripts/libtest-on-target.sh --ci

  # There is no `kani` job. Kani was the interim bounded mechanized tier; every
  # target it covered — the kcore kernel core (proven in the `verus` job) and
  # the rev2§4.7 host chokepoints `ipc`/`urt`/`dma-pool`/`cas` — is now proven
  # unbounded in Verus. The superblock harnesses ported cleanly (no Vec), so the
  # whole job, its pinned-cargo-kani install dance, and the cover-vacuity guard
  # are gone.

  # The concurrency tier: the time-page
  # seqlock under both schedulers. Loom (RUSTFLAGS="--cfg loom") is the
  # certifying proof — urt::time::loom_tests (rev2§4.1), every C11-permitted
  # interleaving + reordering of one writer's seqlock update and one reader's
  # sample(), proving no torn read. Shuttle (RUSTFLAGS="--cfg shuttle") is a
  # non-certifying breadth-smoke — urt::time::shuttle_tests (rev2§4.1 item 5),
  # randomized schedules over the same model; SeqCst-only, so it cannot witness
  # the torn-read class, but it is a second scheduler's sanity pass and the
  # template for the IPC Shuttle models (rev2§4.2). The native proptest stays the
  # breadth/Miri tier (cfg(not(loom),not(shuttle))-gated). It also drives the
  # `ipc` rig (the ModelTransport sender/receiver smoke)
  # under both schedulers. No per-test filter, so a new loom::model / shuttle
  # test in urt or ipc auto-gates — the property the verus job also prizes.
  concurrency:
    runs-on: ubuntu-latest
    # Runaway guard: a Loom model that loses its bound (e.g. an unbounded spin —
    # the failure mode caught + fixed in part 3 via loom::hint::spin_loop)
    # explodes loom's branch search instead of failing fast. Today's model is
    # ~0.2 s; this cap is margin. Bound new models with small state +
    # LOOM_MAX_PREEMPTIONS, not by relaxing this.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Loom models (RUSTFLAGS=--cfg loom cargo test -p urt -p ipc --lib)
        run: RUSTFLAGS="--cfg loom" cargo test -p urt -p ipc --lib
      - name: Shuttle smoke (RUSTFLAGS=--cfg shuttle cargo test -p urt -p ipc --lib)
        run: RUSTFLAGS="--cfg shuttle" cargo test -p urt -p ipc --lib

  # The kcore layering rules: the verified core must contain no
  # inline asm, no MMIO, and no integer->pointer casts — CBMC cannot model
  # any of them soundly. Grep-enforced, same spirit as the
  # no-unsafe-without-comment convention.
  layering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kcore contains no asm / MMIO / int->ptr casts
        run: |
          if [ ! -d kcore/src ]; then
            echo "kcore/src not present yet; skipping layering check."
            exit 0
          fi
          # Forbidden in kcore: asm!/global_asm! macros and any `as *mut` /
          # `as *const` cast. kcore uses `.cast()` for every pointer-to-
          # pointer conversion, so an `as *mut/*const` is always an
          # integer->pointer cast (or a stray pointer cast that should be
          # `.cast()`); either way it is a layering violation. Comment lines
          # may mention the forms freely and are filtered out.
          violations=$(grep -rnE \
            '\b(asm!|global_asm!)|\bas +\*(mut|const)\b' \
            kcore/src --include='*.rs' \
            | grep -vE ':[0-9]+:[[:space:]]*(//|\*)' || true)
          if [ -n "$violations" ]; then
            echo "::error::kcore layering violation:"
            echo "$violations"
            exit 1
          fi
          echo "kcore layering clean."

  # Deductive verification with Verus. PINNED
  # to 0.2026.06.07.cd03505 (the `vstd` companion is pinned in kcore/Cargo.toml +
  # ipc/urt/dma-pool/cas Cargo.toml); an upgrade is a deliberate PR that re-runs the
  # proofs. Covers `kcore` (the kernel object core) and the rev2§4.7 host
  # chokepoints — `ipc`, `urt`, `dma-pool`, and `cas`. Every rev2§4.7 chokepoint
  # is on Verus. No per-proof filter, so a new
  # verus!{} obligation auto-gates (the property the concurrency job also prizes).
  # Verus ships no crates.io binary — the release zip (verus + cargo-verus + z3 +
  # prebuilt vstd) is fetched and cached, keyed on the version so a bump busts the
  # cache.
  verus:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERUS_VERSION: 0.2026.06.07.cd03505
      # Verus's rust_verify driver requires the *exact* rust toolchain it was
      # built against (version.json: 1.95.0); `@stable` floats off it and the run
      # fails with "required rust toolchain 1.95.0-... not found". Bump in lockstep
      # with VERUS_VERSION when the pin moves.
      VERUS_TOOLCHAIN: "1.95.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.VERUS_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Cache Verus toolchain
        id: verus-cache
        uses: actions/cache@v4
        with:
          path: ~/verus
          key: verus-${{ env.VERUS_VERSION }}-${{ runner.os }}
      - name: Install Verus (pinned)
        if: steps.verus-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/verus && cd ~/verus
          url="https://github.com/verus-lang/verus/releases/download/release/${VERUS_VERSION}/verus-${VERUS_VERSION}-x86-linux.zip"
          curl -fsSL "$url" -o verus.zip
          unzip -q verus.zip && rm verus.zip
      - name: Verify kcore + host chokepoints (cargo verus verify)
        run: |
          # The zip extracts to a dir holding `verus`/`cargo-verus`/`z3`; put it on
          # PATH so `cargo verus` resolves (works whether or not it nests a subdir).
          bindir="$(find ~/verus -maxdepth 2 -name cargo-verus -exec dirname {} \; | head -1)"
          if [ -z "$bindir" ]; then echo "::error::cargo-verus not found in the Verus release"; exit 1; fi
          export PATH="$bindir:$PATH"
          cargo verus verify -p kcore
          # rev2§4.7 host chokepoints, one -p per crate: ipc::header; ipc::session
          # codecs + the Admission never-over-grant quota; urt::slots — the bitmap
          # free-list ∀ cap/WORDS; urt::time — the tick→ns conversion's totality +
          # monotonicity ∀; dma-pool — the free-list allocator's two-buffer
          # disjointness + alignment ∀.
          cargo verus verify -p ipc
          cargo verus verify -p urt
          # freelist — the free-list allocator core. The two-buffer-disjointness +
          # alignment ∀ proof is verified once here and shared by dma-pool and the
          # urt heap. The dma-pool gate below re-checks that its wrapper delegates
          # cleanly (it carries 0 obligations of its own — the proof lives here).
          cargo verus verify -p freelist
          # le-bytes — the shared read-direction little-endian byte core (rev2§6,
          # §8): the `u*_le` byte image, the `lemma_u*_le_bytes` `by (bit_vector)`
          # split identities, and the `read_u*_le` byte readers, cited by cas's
          # node decoder and loader's ELF `parse`. no_std/no-alloc sibling, so no
          # --no-default-features needed.
          cargo verus verify -p le-bytes
          cargo verus verify -p dma-pool
          # cas::disk superblock chokepoint — validate_geometry
          # (totality + region-within-device ∀) and decode_checked (totality ∀,
          # blake3 the assumed-total seam). cas is std-on-host / Vec-heavy, so the
          # feature-agnostic superblock fns are verified in the no_std+alloc
          # variant (--no-default-features).
          cargo verus verify -p cas --no-default-features
          # virtio-blk avail-ring index + LBA-bound arithmetic — `avail_ring_slot`
          # (the slot byte-offset 4 + 2*(idx % qsize) and its in-bounds bound ∀ idx,
          # qsize 1..=8) and `capacity_check` (the `check_capacity` LBA bound:
          # OutOfRange exactly when lba + len/SECTOR exceeds capacity, overflow-safe
          # ∀ inputs). The generic driver, MMIO `unsafe`, fake device, and cas
          # blockdev adapter stay external; the device-shared ring is the trusted
          # DMA seam (rev2§2.5). virtio-blk links cas (the no_std blockdev adapter
          # storaged uses), which turns on vstd's `alloc` feature, so this session
          # re-verifies freelist under that richer prelude — freelist's
          # free_insert/free_both rlimit budgets are sized to cover it.
          cargo verus verify -p virtio-blk
          # storage-server rights lattice — `attenuate` is `parent & mask`:
          # monotone (sets no bit absent from the parent), strips `R_STAT_STORE`
          # whenever the mask omits bit 5, and `R_ALL` denies it by default ∀ u8 —
          # plus the wire-decode header/version prefix (`check_header`, rev2§3.7):
          # total ∀ bytes, refuses BadHeader exactly on short/bad-magic and
          # Version exactly on good-magic-wrong-version (composing on the verified
          # `ipc::version_ok`), magic before version. The session/handle dispatch
          # stays external; the postcard body decode stays the trusted seam by
          # feature-exclusion (serde-gated, dropped here — no external_body). Like
          # cas it verifies in the no_std+alloc variant (--no-default-features),
          # and --lib skips the placeholder bin (which carries no proofs). Links
          # cas+ipc, re-verified under the alloc prelude.
          cargo verus verify -p storage-server --no-default-features --lib
          # loader ELF decoder — `Segment::page_layout` total/overflow-safe ∀
          # (vaddr, memsz): Err exactly when vaddr+memsz+(PAGE-1) overflows u64;
          # otherwise both ends page-aligned, encloses vaddr (strictly when
          # memsz>0), page_offset in [0,PAGE), pages counts the span exactly. And
          # `parse` is a total bounded decoder ∀ &[u8] (no panic/OOB), with the
          # mask/shift little-endian field readers proven to reassemble each value
          # (`read_u{16,32,64}_le` vs `u*_le`); every accepted Image is
          # well-formed (1..=MAX_SEGMENTS segments, each file extent in-bounds and
          # `page_layout`-safe). The startup byte codec and the target-only spawn
          # stay external; verified as the no_std core (--no-default-features).
          # Links ipc, re-verified transitively.
          cargo verus verify -p loader --no-default-features
          # eunomia-sys syscall encoder — `encode` (the inverse of sysabi::decode,
          # rev2§3.7): total over every `Call`, always a defined opcode (nr < 27),
          # each argument placed in decode's register, and out-of-range fields refused
          # (the message-length cap, the ObjType/event/which/priority ranges) — so the
          # PAL provably cannot issue a shape-rejectable syscall (the §11 inverse-leak
          # rule). The local ABI bound consts are pinned against kcore by the host
          # round-trip test (a kcore dev-dep, out of this verify session). The raw
          # `svc` register marshalling + the typed wrappers are the trusted shell
          # (rev2§6.1(d), the §6.1(d) thread-lifecycle-shell row — no new seam). Links
          # loader, re-verified transitively (ipc, le-bytes).
          cargo verus verify -p eunomia-sys
