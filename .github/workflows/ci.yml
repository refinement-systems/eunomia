name: ci

# Phase 4 of the process-caps plan: rerun the formal models and the host
# test suite on every PR, and boot the system under QEMU to run the §5.1
# spawn/reclaim exit criterion. Fuzzing has its own workflow (fuzz.yml).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Host unit + integration tests for every workspace crate except the
  # kernel (no_std / bare-metal aarch64 — it can't build for the host).
  # Covers the slot-allocator (urt), the monotone rights-mask attenuation
  # (storage-server sessions), the CAS canonical-form proptests, the wire
  # decoders, the ELF parser, and the rest.
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace minus kernel)
        run: cargo test --workspace --exclude kernel
      - name: exhaustive CDT replays (cheap depth — continuous regression guard)
        # The mini-TLC replays (kcore::proofs::exhaustive) are #[ignore]d so the
        # deep depths stay off the per-PR path (scripts/deep-verify.sh / the
        # kani-deep job). Run them here at depth 3 — milliseconds-to-~0.2 s — so
        # the CDT-algebra composition AND the revoke-through-queue/TCB-bind-slot
        # coverage are exercised on every PR, not only by hand.
        run: EXHAUSTIVE_DEPTH=3 CROSS_HOME_DEPTH=3 cargo test -p kcore exhaustive -- --ignored --nocapture

  # Rerun the TLA+ proofs. Both the CapRevocation safety model (incl. the
  # §3.3 channel whole-object teardown TSpec) and the CommitProtocol model
  # must come back clean — the M1/M2 formal gates, re-checked on every PR.
  model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Fetch TLA+ tools (tla2tools.jar)
        run: |
          curl -fsSL -o "$RUNNER_TEMP/tla2tools.jar" \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
      - name: Model-check CapRevocation (+ teardown) and CommitProtocol
        # find-tla-tools.sh honours a pre-set JAVA + TLA_TOOLS instead of
        # probing for the macOS Toolbox, so the same scripts run here.
        env:
          JAVA: java
          TLA_TOOLS: ${{ runner.temp }}/tla2tools.jar
        run: |
          bash tools/tla/tla-model-check.sh tla/cap_revocation/CapRevocation.tla
          bash tools/tla/tla-model-check.sh tla/cap_revocation/CapRevocation.tla CapRevocation_Teardown.cfg
          bash tools/tla/tla-model-check.sh tla/commit_protocol/CommitProtocol.tla

  # The §5.1 exit criterion: boot the real system under QEMU and drive the
  # shell through the burn regression (spawn/wait/reclaim 100x), status
  # propagation, the wild-pointer fault demo + re-spawn, the panic path,
  # and the time grant. Also runs the M1 cap-mechanism EL0 test. Needs a
  # nightly toolchain with rust-src for the kernel's build-std.
  on-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Install QEMU (aarch64 system emulation)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-arm
      - name: M1 cap-mechanism test (caps/CDT, revoke, reports, teardown)
        run: bash scripts/m1-test.sh
      - name: Spawn/reclaim burn loop + fault / panic / time demo
        run: bash scripts/spawn-test.sh

  # Bounded model checking of the kernel object core (kcore) with Kani
  # (cargo-kani PINNED — upgrades are deliberate PRs that re-run the suite,
  # plan §5/§8). Re-checks the CapRevocation TLA invariants on the real
  # implementation code at TLC-scale bounds. Runs every harness (no
  # --harness filter), so adding a harness automatically gates.
  kani:
    runs-on: ubuntu-latest
    # Budget (plan §8): each harness ≤ ~5 min, whole suite ≤ ~30 min. The suite
    # is sequential and kcore-dominated (~22 of ~23 min on the dev machine);
    # CI runners are slower and a cache-miss `cargo install kani-verifier` adds
    # minutes, so this hard cap is a runaway guard with margin above the 30-min
    # target, not the target itself (review rec. #5, doc/results/13_kani-findings-11.md).
    # When the suite next outgrows the budget, split kcore into a matrix by
    # `--harness` group — note that trades away the current "no --harness filter
    # ⇒ a new harness auto-gates" property, so it is deferred until needed.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cargo-kani 0.67.0 + its CBMC/kissat backend (cargo kani setup) are
      # slow to install; cache both, keyed on the pinned version so a bump
      # busts the cache.
      - name: Cache cargo-kani + backend
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: kani-0.67.0-${{ runner.os }}
      - name: Install Kani (pinned)
        # Kani ships as the `kani-verifier` crate: installing it provides the
        # `cargo-kani` and `kani` binaries, and `cargo kani setup` then
        # downloads the matching CBMC backend. There is no `cargo-kani` crate
        # on crates.io — installing that name is what broke this job ("could
        # not find cargo-kani in cargo-registry crates-io ..."). The CLI is
        # still invoked as `cargo kani`; only the install crate name differs.
        run: |
          if ! command -v cargo-kani >/dev/null; then
            cargo install --locked kani-verifier --version 0.67.0
          fi
          cargo kani setup
      # Run from the repo root: there is no root .cargo/config.toml, so the
      # host target applies. (Inside kernel/ the directory-scoped config
      # would force the bare-metal target Kani can't drive.)
      - name: Kani proof suite (kcore core + host targets)
        # (The scratchpad toolchain-smoke proof is retired — the real kcore +
        #  host-side suites are the smoke test now, plan §8.)
        run: |
          set -o pipefail
          # -Z stubbing: the §4.1 teardown harnesses stub the recursive
          # container destructors (destroy_cspace/channel/tcb) so a top-level
          # `delete` stays tractable — finding DN-4, doc/results/2_kani-findings.md.
          cargo kani -Z stubbing -p kcore 2>&1 | tee kani-kcore.log
          # §4.7 host-side targets. cas's superblock-decode harness stubs the
          # blake3 hash, so cas runs with -Z stubbing (harmless for the rest).
          cargo kani -p urt -p ipc -p dma-pool 2>&1 | tee kani-host.log
          cargo kani -p cas -Z stubbing 2>&1 | tee kani-cas.log
          # rec #3 vacuity guard (doc/results/11_kani-findings-9.md): kani::cover!
          # is *informational* — an unreachable cover does NOT fail the run, it
          # only lowers the "N of M cover properties satisfied" tally. So fail
          # here if any harness reported N < M (a cover went UNREACHABLE, meaning
          # an over-constraining `assume` may have made a proof vacuous).
          #
          # Two distinct fail-closed modes, kept distinct so the message is not
          # misleading (review-2 rec. #5, doc/results/17_kani-findings-14.md): an
          # ABSENT tally — grep matches zero lines, i.e. a Kani output-format
          # change or a log that never wrote — is not the same as a cover that
          # went UNREACHABLE. The `|| true` keeps a zero-match grep from tripping
          # `pipefail`/`-e` before the explicit emptiness check below.
          covers=$(grep -hE 'cover properties satisfied' kani-*.log || true)
          if [ -z "$covers" ]; then
            echo "::error::no 'cover properties satisfied' lines in the kani logs — Kani's output format may have changed or a log failed to write; the vacuity guard could not run (rec #5)"
            exit 1
          fi
          if printf '%s\n' "$covers" \
               | awk '{ if ($2 != $4) { print "UNREACHABLE cover: " $0; bad=1 } } END { exit bad+0 }'; then
            echo "all kani::cover! checkpoints satisfied"
          else
            echo "::error::a kani::cover! checkpoint was UNREACHABLE — a proof may be vacuous (rec #3)"
            exit 1
          fi

  # The kcore layering rules (plan §2.2): the verified core must contain no
  # inline asm, no MMIO, and no integer->pointer casts — CBMC cannot model
  # any of them soundly. Grep-enforced, same spirit as the
  # no-unsafe-without-comment convention.
  layering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kcore contains no asm / MMIO / int->ptr casts
        run: |
          if [ ! -d kcore/src ]; then
            echo "kcore/src not present yet; skipping layering check."
            exit 0
          fi
          # Forbidden in kcore: asm!/global_asm! macros and any `as *mut` /
          # `as *const` cast. kcore uses `.cast()` for every pointer-to-
          # pointer conversion, so an `as *mut/*const` is always an
          # integer->pointer cast (or a stray pointer cast that should be
          # `.cast()`); either way it is a layering violation. Comment lines
          # may mention the forms freely and are filtered out.
          violations=$(grep -rnE \
            '\b(asm!|global_asm!)|\bas +\*(mut|const)\b' \
            kcore/src --include='*.rs' \
            | grep -vE ':[0-9]+:[[:space:]]*(//|\*)' || true)
          if [ -n "$violations" ]; then
            echo "::error::kcore layering violation (plan §2.2):"
            echo "$violations"
            exit 1
          fi
          echo "kcore layering clean."
